# Publish to GitHub Packages on every `sdk-v*` tag push.
# Renames the package to @zero-arena/sdk for the GH Packages registry
# (scoped names required there); npmjs.org keeps the bare `zeroarena` name
# via the separate `npm publish` step run from a maintainer machine.

name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'sdk-v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Releases
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@zero-arena'

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Rename to @zero-arena/sdk for GH Packages
        run: npm pkg set name=@zero-arena/sdk

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release (tag-triggered runs only)
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/sdk-v')
        uses: softprops/action-gh-release@v3
        with:
          name: '@zero-arena/sdk ${{ github.ref_name }} (GitHub Packages mirror)'
          body: |
            GitHub Packages mirror of [`zeroarena`](https://www.npmjs.com/package/zeroarena) on npm.js.

            Install:

            ```bash
            npm install @zero-arena/sdk --registry=https://npm.pkg.github.com
            ```

            See the [main release](https://github.com/${{ github.repository }}/releases) for changelog (tag prefix `v` instead of `sdk-v`).
